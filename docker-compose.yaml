name: ci-cd-web-tech
services:
  jenkins:
    image: jenkins/jenkins:2.551
    networks:
      default:
        aliases:
          - cafe-app #testing for selenium and jenkins in the pipeline as they are on the same port
    ports:
      - "8083:8080"      # Jenkins UI
      - "8081:8081"      #Cafe App
      - "50000:50000"    # Jenkins agents
    volumes:
      - jenkins_data:/var/jenkins_home
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "--url=daily-lenient-kiwi.ngrok-free.app"
      - "cafe-app:8080"
    environment:
      NGROK_AUTHTOKEN: "REPLACE_WITH_YOUR_ACTUAL_TOKEN"
    depends_on:
      - jenkins

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb        # Critical: Prevents Chrome from crashing in Docker
    ports:
      - "4444:4444"      # The port Jenkins will use to talk to the browser
      - "7900:7900"      # (Optional) You can go to localhost:7900 to see the browser live!
    restart: unless-stopped


  sonarqube:
    image: sonarqube:26.2.0.119303-community
    depends_on:
      - sonarqube_db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube_db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

  sonarqube_db:
    image: postgres:15
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  jenkins_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db_data: