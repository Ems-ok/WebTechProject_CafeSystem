name: ci-cd-web-tech

services:
  jenkins:
    image: jenkins/jenkins:2.551
    networks:
      cafe-net:
        aliases:
          - cafe-app
    ports:
      - "8083:8080"
      - "8082:8081"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    restart: unless-stopped

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    networks:
      - cafe-net
    ports:
      - "4444:4444"
      - "7900:7900"
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "http"
      - "--url=daily-lenient-kiwi.ngrok-free.app"
      - "cafe-app:8080"
    environment:
      NGROK_AUTHTOKEN: "3B5pbQZIezCOI5ABJ6UsbeI3e0K_2RfJK8wDhLCQmTnBziDrU"
    networks:
      - cafe-net
    depends_on:
      - jenkins

  sonarqube:
    image: sonarqube:26.2.0.119303-community
    networks:
      - cafe-net
    depends_on:
      - sonarqube_db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube_db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

  sonarqube_db:
    image: postgres:15
    networks:
      - cafe-net
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    restart: unless-stopped

networks:
  cafe-net:
    driver: bridge

volumes:
  jenkins_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db_data: